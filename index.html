<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evoluční Survivor - Mechanismy Evoluce</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700&display=swap');
        body { font-family: 'Lexend', sans-serif; background-color: #f0f4f8; }
        .game-canvas { background: #e2e8f0; border-radius: 12px; position: relative; overflow: hidden; min-height: 400px; }
        .pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .progress-transition { transition: width 0.1s linear; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-bold text-indigo-700 mb-2">Evoluční Survivor 🧬</h1>
            <p class="text-lg text-slate-600 italic">Interaktivní průvodce mechanismy evoluce</p>
        </header>

        <!-- Main Menu -->
        <div id="main-menu" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <button onclick="startLevel('red-queen')" class="p-6 bg-white border-2 border-indigo-100 rounded-2xl shadow-sm hover:shadow-xl hover:border-indigo-500 transition-all text-left group">
                <div class="text-3xl mb-2 group-hover:scale-110 transition-transform">🏃‍♂️</div>
                <h3 class="text-xl font-bold text-indigo-600 mb-1">1. Efekt červené královny</h3>
                <p class="text-sm text-slate-500">Závod mezi predátorem a kořistí. Musíš se neustále zrychlovat, abys přežil!</p>
            </button>
            
            <button onclick="startLevel('sexual-selection')" class="p-6 bg-white border-2 border-indigo-100 rounded-2xl shadow-sm hover:shadow-xl hover:border-indigo-500 transition-all text-left group">
                <div class="text-3xl mb-2 group-hover:scale-110 transition-transform">🦚</div>
                <h3 class="text-xl font-bold text-indigo-600 mb-1">2. Pohlavní výběr</h3>
                <p class="text-sm text-slate-500">Vybírej partnery podle krásy. Pozor ale, aby okrasa nebyla příliš velkou zátěží.</p>
            </button>

            <button onclick="startLevel('bottleneck')" class="p-6 bg-white border-2 border-indigo-100 rounded-2xl shadow-sm hover:shadow-xl hover:border-indigo-500 transition-all text-left group">
                <div class="text-3xl mb-2 group-hover:scale-110 transition-transform">🧪</div>
                <h3 class="text-xl font-bold text-indigo-600 mb-1">3. Efekt hrdla lahve</h3>
                <p class="text-sm text-slate-500">Sleduj, jak náhodná katastrofa změní genetickou tvář celé populace.</p>
            </button>

            <button onclick="showGlossary()" class="p-6 bg-indigo-600 text-white rounded-2xl shadow-lg hover:bg-indigo-700 transition-all flex items-center justify-center font-bold text-xl">
                📜 Slovníček pojmů
            </button>
        </div>

        <!-- Game Container -->
        <div id="game-container" class="hidden mt-6 bg-white p-6 rounded-3xl shadow-2xl border border-slate-200">
            <div id="level-header" class="flex justify-between items-center mb-6">
                <h2 id="level-title" class="text-2xl font-bold text-slate-800 tracking-tight">Úroveň</h2>
                <button onclick="exitGame()" class="bg-slate-100 px-4 py-2 rounded-xl text-slate-500 hover:text-red-500 font-bold transition-colors">Ukončit</button>
            </div>
            
            <div id="game-display" class="game-canvas flex items-center justify-center text-center p-4">
                <!-- Dynamický obsah -->
            </div>

            <div id="game-controls" class="mt-8 flex flex-wrap gap-4 justify-center">
                <!-- Ovládací prvky -->
            </div>

            <div id="level-info" class="mt-8 p-5 bg-indigo-50 rounded-2xl text-sm border border-indigo-100 leading-relaxed">
                <!-- Vysvětlení mechanismu -->
            </div>
        </div>

        <!-- Glossary Modal -->
        <div id="glossary" class="hidden mt-6 bg-white p-8 rounded-3xl shadow-2xl border border-slate-200">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-bold text-indigo-700">📜 Výukový Slovníček</h2>
                <button onclick="exitGame()" class="bg-indigo-100 text-indigo-700 px-6 py-2 rounded-xl font-bold hover:bg-indigo-200">Zpět</button>
            </div>
            <div id="glossary-content" class="grid grid-cols-1 gap-4 overflow-y-auto max-h-[60vh] pr-2">
                <!-- Obsah z DOCX -->
            </div>
        </div>
    </div>

    <script>
        const glossaryData = [
            { term: "Přírodní výběr", def: "Hlavní mechanismus evoluce. Jedinci s výhodnými vlastnostmi mají větší šanci na rozmnožení a předání znaků další generaci. Funguje jako tlak prostředí a predátorů." },
            { term: "Pohlavní výběr", def: "Mechanismus, ve kterém si převážně samičky vybírají samce s výhodnějšími vlastnostmi (např. paví ocas), čímž zvyšují šanci na přežití potomstva." },
            { term: "Efekt červené královny", def: "Evoluční hypotéza: organismy musí neustále reagovat na evoluci jiných druhů. 'Musíš běžet, abys zůstal na místě' (např. kořist vs. predátor)." },
            { term: "Efekt hrdla lahve", def: "Jev, kdy dojde k drastickému úbytku jedinců (katastrofa). Přežití je náhodné a dochází k dramatické změně genetické variability bez ohledu na výhodnost znaků." },
            { term: "Fitness", def: "Biologická zdatnost. Schopnost jedince přežít a úspěšně předat své geny další generaci." },
            { term: "Adaptace", def: "Proces přizpůsobení se životnímu prostředí pomocí genetických změn vyvolaných tlaky okolí." },
            { term: "Variabilita", def: "Rozdíly mezi jedinci stejného druhu vznikající mutacemi a rekombinací. Je to 'materiál', se kterým pracuje přírodní výběr." },
            { term: "Fylogeneze", def: "Věda zkoumající vývojové vztahy a historii organismů." }
        ];

        let gameState = {
            currentLevel: '',
            timer: null,
            speed: 50,
            enemySpeed: 40,
            population: []
        };

        function startLevel(id) {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('glossary').classList.add('hidden');
            document.getElementById('game-container').classList.remove('hidden');
            gameState.currentLevel = id;
            
            const display = document.getElementById('game-display');
            const controls = document.getElementById('game-controls');
            const info = document.getElementById('level-info');
            const title = document.getElementById('level-title');

            display.innerHTML = '';
            controls.innerHTML = '';
            display.className = "game-canvas flex items-center justify-center text-center p-4";
            
            if (id === 'red-queen') {
                title.innerText = 'Efekt červené královny';
                info.innerHTML = '<strong>Vysvětlení:</strong> V tomto závodě se liška i králík vyvíjejí. Pokud přestaneš klikat (přestaneš se adaptovat), liška tě dožene. V přírodě musíš neustále "běžet", abys nevyhynul.';
                setupRedQueen();
            } else if (id === 'sexual-selection') {
                title.innerText = 'Pohlavní výběr';
                info.innerHTML = '<strong>Vysvětlení:</strong> Jako samička vybíráš otce svého potomstva. Velká pera značí zdraví a sílu, ale jsou těžká. Pokud vybereš extrém, samec nepřežije útok predátora.';
                setupSexualSelection();
            } else if (id === 'bottleneck') {
                title.innerText = 'Efekt hrdla lahve';
                info.innerHTML = '<strong>Vysvětlení:</strong> Sleduj populaci tuleňů (šedí a bílí). Po katastrofě přežije jen hrstka. Je jedno, kdo byl "lepší" – přežití je v tomto případě dílem náhody.';
                setupBottleneck();
            }
        }

        function setupRedQueen() {
            gameState.speed = 55;
            gameState.enemySpeed = 40;
            const display = document.getElementById('game-display');
            display.innerHTML = `
                <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-inner">
                    <div class="mb-4 flex justify-between font-bold text-green-600"><span>Tvoje Fitness (Králík)</span> <span id="p-speed">55</span></div>
                    <div class="w-full bg-slate-200 h-6 rounded-full mb-8">
                        <div id="p-bar" class="bg-green-500 h-full rounded-full progress-transition" style="width: 55%"></div>
                    </div>
                    <div class="mb-4 flex justify-between font-bold text-red-600"><span>Fitness Lišky</span> <span id="e-speed">40</span></div>
                    <div class="w-full bg-slate-200 h-6 rounded-full">
                        <div id="e-bar" class="bg-red-500 h-full rounded-full progress-transition" style="width: 40%"></div>
                    </div>
                </div>
            `;
            
            const controls = document.getElementById('game-controls');
            const btn = document.createElement('button');
            btn.className = 'bg-indigo-600 text-white px-10 py-5 rounded-2xl font-black text-xl shadow-xl hover:bg-indigo-700 active:scale-95 transition-all pulse uppercase tracking-tighter';
            btn.innerText = 'ADAPTOVAT SE (Klikej!) ✨';
            btn.onclick = () => { gameState.speed = Math.min(gameState.speed + 3.5, 100); };
            controls.appendChild(btn);

            gameState.timer = setInterval(() => {
                gameState.speed -= 0.65;
                gameState.enemySpeed += 0.45;
                
                document.getElementById('p-speed').innerText = Math.round(gameState.speed);
                document.getElementById('e-speed').innerText = Math.round(gameState.enemySpeed);
                document.getElementById('p-bar').style.width = gameState.speed + '%';
                document.getElementById('e-bar').style.width = gameState.enemySpeed + '%';

                if (gameState.speed <= gameState.enemySpeed) {
                    clearInterval(gameState.timer);
                    showMessage('KONEC: Liška tě dohonila! Kdo se v evoluci zastaví, ten vyhyne.', 'red');
                }
                if (gameState.enemySpeed >= 95) {
                    clearInterval(gameState.timer);
                    showMessage('VÍTĚZSTVÍ: Úspěšně jsi udržel krok s evolučním tlakem!', 'green');
                }
            }, 100);
        }

        function setupSexualSelection() {
            const display = document.getElementById('game-display');
            display.className = "game-canvas grid grid-cols-2 gap-4 p-6 items-center";
            
            const choices = [
                { size: 85, label: 'Krátká pera' },
                { size: 130, label: 'Střední pera' },
                { size: 195, label: 'Obří pera' },
                { size: 110, label: 'Zdravá pera' }
            ];

            choices.forEach(c => {
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-2xl border-2 border-slate-100 cursor-pointer hover:border-indigo-500 hover:shadow-lg transition-all text-center group";
                div.innerHTML = `
                    <div class="text-5xl mb-3 group-hover:scale-110 transition-transform">🦚</div>
                    <div class="font-bold text-lg">${c.size} cm</div>
                    <div class="text-xs text-slate-400 uppercase font-bold tracking-widest mt-1">${c.label}</div>
                `;
                div.onclick = () => {
                    if (c.size > 150) {
                        showMessage('ŠPATNĚ: Samec byl sice krásný, ale jeho pera byla tak těžká, že neulétl predátorovi. Tvé potomstvo nepřežilo.', 'red');
                    } else if (c.size < 90) {
                        showMessage('POZOR: Tento samec je sice hbitý, ale jeho pera nejsou dostatečně atraktivní. Tvé potomstvo nebude mít úspěch u samiček.', 'orange');
                    } else {
                        showMessage('SKVĚLE: Našla jsi rovnováhu (Trade-off). Samec je atraktivní a zároveň dostatečně fit pro přežití!', 'green');
                    }
                };
                display.appendChild(div);
            });
        }

        function setupBottleneck() {
            const display = document.getElementById('game-display');
            display.className = "game-canvas relative flex flex-col items-center justify-center p-8";
            
            let pop = [];
            for(let i=0; i<32; i++) {
                pop.push(Math.random() > 0.4 ? '🦭' : '⚪'); // Hnědí vs Bílí
            }

            const renderPop = (currentPop) => {
                display.innerHTML = `
                    <div class="text-sm font-bold text-slate-400 mb-6 uppercase tracking-widest">Původní populace (Variabilita)</div>
                    <div class="flex flex-wrap gap-2 justify-center max-w-md">
                        ${currentPop.map(t => `<span class="text-3xl transition-all duration-500">${t}</span>`).join('')}
                    </div>
                `;
            };

            renderPop(pop);

            const controls = document.getElementById('game-controls');
            const btn = document.createElement('button');
            btn.className = 'bg-red-600 text-white px-8 py-4 rounded-2xl font-bold shadow-lg hover:bg-red-700 transition-all uppercase';
            btn.innerText = 'Spustit katastrofu (Lov) 🏹';
            btn.onclick = () => {
                const survivors = [];
                for(let i=0; i<5; i++) {
                    survivors.push(pop[Math.floor(Math.random() * pop.length)]);
                }
                
                display.innerHTML = `
                    <div class="text-center bg-white p-8 rounded-3xl shadow-xl border border-red-100">
                        <div class="text-red-500 font-black text-xl mb-4">EFEKT HRDLA LAHVE</div>
                        <div class="text-slate-500 text-sm mb-6">Populace byla zredukována. Přežilo jen těchto 5 jedinců:</div>
                        <div class="flex justify-center gap-6 mb-8 text-6xl drop-shadow-md">
                            ${survivors.map(s => `<span>${s}</span>`).join('')}
                        </div>
                        <p class="text-xs text-slate-400 italic">Vidíš tu změnu? Přežití nebylo o tom, kdo je lepší, ale o náhodě.</p>
                        <button onclick="startLevel('bottleneck')" class="mt-6 bg-slate-800 text-white px-6 py-2 rounded-xl text-sm font-bold">Zkusit jinou katastrofu</button>
                    </div>
                `;
                btn.remove();
            };
            controls.appendChild(btn);
        }

        function showMessage(msg, color) {
            const display = document.getElementById('game-display');
            display.className = "game-canvas flex items-center justify-center p-8";
            const borderCol = color === 'red' ? 'border-red-500' : (color === 'orange' ? 'border-orange-500' : 'border-green-500');
            const textCol = color === 'red' ? 'text-red-600' : (color === 'orange' ? 'text-orange-600' : 'text-green-600');
            
            display.innerHTML = `
                <div class="bg-white p-10 rounded-3xl shadow-2xl border-t-8 ${borderCol} max-w-sm w-full text-center">
                    <p class="text-xl font-bold mb-6 ${textCol}">${msg}</p>
                    <button onclick="exitGame()" class="bg-slate-800 text-white px-8 py-3 rounded-xl font-bold hover:scale-105 transition-transform">Zpět do menu</button>
                </div>
            `;
            document.getElementById('game-controls').innerHTML = '';
        }

        function showGlossary() {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('game-container').classList.add('hidden');
            document.getElementById('glossary').classList.remove('hidden');
            const container = document.getElementById('glossary-content');
            container.innerHTML = glossaryData.map(item => `
                <div class="p-5 bg-slate-50 border-l-8 border-indigo-500 rounded-r-2xl shadow-sm">
                    <h4 class="font-bold text-indigo-700 text-xl mb-1">${item.term}</h4>
                    <p class="text-slate-600 text-sm leading-relaxed">${item.def}</p>
                </div>
            `).join('');
        }

        function exitGame() {
            if (gameState.timer) clearInterval(gameState.timer);
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('game-container').classList.add('hidden');
            document.getElementById('glossary').classList.add('hidden');
            document.getElementById('game-display').className = "game-canvas flex items-center justify-center text-center p-4";
        }
    </script>
</body>
</html>
